<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记账本</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #f5f6fa; padding: 16px; padding-bottom: 80px; }
    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .btn { padding: 10px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn-primary { background: #4A90D9; color: #fff; }
    .btn-default { background: #f5f6fa; color: #333; }
    .btn-active { background: #4A90D9 !important; color: #fff !important; }
    .nav { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: #fff; border-top: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: space-around; z-index: 100; }
    .nav-item { text-decoration: none; color: #999; font-size: 11px; display: flex; flex-direction: column; align-items: center; padding: 6px 12px; }
    .nav-item.active { color: #4A90D9; }
    .nav-icon { font-size: 20px; margin-bottom: 2px; }
    .add-btn { width: 48px; height: 48px; border-radius: 50%; background: #4A90D9; color: #fff; font-size: 28px; display: flex; align-items: center; justify-content: center; margin-top: -12px; box-shadow: 0 4px 12px rgba(74,144,217,0.4); text-decoration: none; }
  </style>
</head>
<body>
  <div id="app">
    <router-view></router-view>
    <nav class="nav">
      <router-link to="/" class="nav-item" custom v-slot="{ navigate, isActive }">
        <span class="nav-item" :class="{ active: isActive }" @click="navigate"><span class="nav-icon">🏠</span>首页</span>
      </router-link>
      <router-link to="/bill" class="nav-item" custom v-slot="{ navigate, isActive }">
        <span class="nav-item" :class="{ active: isActive }" @click="navigate"><span class="nav-icon">📋</span>账单</span>
      </router-link>
      <router-link to="/add" class="add-btn" custom v-slot="{ navigate, isActive }">
        <span class="add-btn" :class="{ active: isActive }" @click="navigate">+</span>
      </router-link>
      <router-link to="/statistics" class="nav-item" custom v-slot="{ navigate, isActive }">
        <span class="nav-item" :class="{ active: isActive }" @click="navigate"><span class="nav-icon">📊</span>统计</span>
      </router-link>
      <router-link to="/settings" class="nav-item" custom v-slot="{ navigate, isActive }">
        <span class="nav-item" :class="{ active: isActive }" @click="navigate"><span class="nav-icon">⚙️</span>设置</span>
      </router-link>
    </nav>
  </div>

  <script type="importmap">
  {
    "imports": {
      "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.prod.js",
      "vue-router": "https://unpkg.com/vue-router@4/dist/vue-router.esm-browser.prod.js"
    }
  }
  </script>

  <script type="module">
    import { createApp, ref, computed, onMounted, watch } from 'vue'
    import { createRouter, createWebHashHistory } from 'vue-router'

    const STORAGE_KEY = 'ledger_records'

    const CATEGORIES = {
      expense: [
        { id: 'food', name: '餐饮', icon: '🍜' }, { id: 'transport', name: '交通', icon: '🚗' },
        { id: 'shopping', name: '购物', icon: '🛍️' }, { id: 'housing', name: '住房', icon: '🏠' },
        { id: 'entertainment', name: '娱乐', icon: '🎮' }, { id: 'medical', name: '医疗', icon: '🏥' },
        { id: 'education', name: '教育', icon: '📚' }, { id: 'communication', name: '通讯', icon: '📱' },
        { id: 'clothing', name: '服饰', icon: '👔' }, { id: 'beauty', name: '美容', icon: '💄' },
        { id: 'sports', name: '运动', icon: '⚽' }, { id: 'pet', name: '宠物', icon: '🐾' },
        { id: 'travel', name: '旅行', icon: '✈️' }, { id: 'gift', name: '礼物', icon: '🎁' },
        { id: 'other_expense', name: '其他', icon: '📝' }
      ],
      income: [
        { id: 'salary', name: '工资', icon: '💰' }, { id: 'bonus', name: '奖金', icon: '🏆' },
        { id: 'investment', name: '理财', icon: '📈' }, { id: 'parttime', name: '兼职', icon: '💼' },
        { id: 'redpacket', name: '红包', icon: '🧧' }, { id: 'refund', name: '退款', icon: '↩️' },
        { id: 'other_income', name: '其他', icon: '📝' }
      ]
    }

    function getCatName(id) {
      for (const list of Object.values(CATEGORIES)) {
        const c = list.find(x => x.id === id)
        if (c) return c.name
      }
      return '未分类'
    }
    function getCatIcon(id) {
      for (const list of Object.values(CATEGORIES)) {
        const c = list.find(x => x.id === id)
        if (c) return c.icon
      }
      return '📝'
    }
    function getRecords() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]') } catch { return [] }
    }
    function saveRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records))
    }

    const Home = {
      template: `
        <div>
          <div class="card" style="background:linear-gradient(135deg,#4A90D9,#357ABD);color:#fff">
            <div style="font-size:13px;opacity:0.8">本月支出</div>
            <div style="font-size:22px;font-weight:600;margin:8px 0;color:#FFD9D9">¥{{ monthExpense }}</div>
            <div style="font-size:13px;opacity:0.8">本月收入</div>
            <div style="font-size:22px;font-weight:600;color:#B8E6B8">¥{{ monthIncome }}</div>
          </div>
          <div class="card">
            <div style="font-size:15px;font-weight:600;margin-bottom:12px">今日</div>
            <div v-if="todayRecords.length === 0" style="text-align:center;padding:24px;color:#999;font-size:14px">今日暂无记录</div>
            <div v-for="r in todayRecords.slice(0,5)" :key="r.id" style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0">
              <span>{{ getCatIcon(r.categoryId) }} {{ getCatName(r.categoryId) }} <span v-if="r.note" style="color:#999;font-size:12px">({{ r.note }})</span></span>
              <span :style="{ color: r.type === 'expense' ? '#FF6B6B' : '#4CAF50', fontWeight: 600 }">
                {{ r.type === 'expense' ? '-' : '+' }}¥{{ r.amount.toFixed(2) }}
              </span>
            </div>
          </div>
          <div class="card" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:16px">
            <div v-for="item in [{ icon: '📊', label: '统计', path: '/statistics' }, { icon: '💰', label: '预算', path: '/budget' }, { icon: '🏦', label: '资产', path: '/assets' }, { icon: '🧾', label: '报销', path: '/reimburse' }]" :key="item.path" @click="go(item.path)" style="text-align:center;padding:12px;cursor:pointer;border-radius:8px;background:#f5f6fa">
              <div style="font-size:20px">{{ item.icon }}</div>
              <div style="font-size:12px;color:#666;margin-top:4px">{{ item.label }}</div>
            </div>
          </div>
        </div>
      `,
      setup() {
        const records = ref([])
        const go = (path) => { window.location.hash = '#' + path }

        onMounted(() => { records.value = getRecords() })

        const monthRecords = computed(() => {
          const now = new Date()
          const m = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`
          return records.value.filter(r => r.date && r.date.startsWith(m))
        })
        const todayRecords = computed(() => {
          const today = new Date().toISOString().split('T')[0]
          return records.value.filter(r => r.date && r.date.startsWith(today))
        })
        const monthExpense = computed(() => monthRecords.value.filter(r => r.type === 'expense').reduce((s, r) => s + r.amount, 0).toFixed(2))
        const monthIncome = computed(() => monthRecords.value.filter(r => r.type === 'income').reduce((s, r) => s + r.amount, 0).toFixed(2))

        return { monthExpense, monthIncome, todayRecords, records, getCatName, getCatIcon, go }
      }
    }

    const AddRecord = {
      template: `
        <div>
          <div class="card">
            <div style="display:flex;gap:8px;margin-bottom:16px">
              <button @click="setType('expense')" :class="['btn', { 'btn-active': type === 'expense' }]" style="flex:1">支出</button>
              <button @click="setType('income')" :class="['btn', { 'btn-active': type === 'income' }]" style="flex:1">收入</button>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
              <div v-for="cat in cats" :key="cat.id" @click="selectCat(cat)" :style="{ padding: '8px 12px', borderRadius: '8px', background: selectedCat?.id === cat.id ? '#4A90D920' : '#f5f6fa', cursor: 'pointer', fontSize: '13px', textAlign: 'center', minWidth: '60px' }">
                <div style="font-size:20px">{{ cat.icon }}</div>
                <div style="font-size:12px;color:#666;margin-top:2px">{{ cat.name }}</div>
              </div>
            </div>
          </div>
          <div class="card">
            <input v-model="amount" type="number" step="0.01" placeholder="0.00" style="width:100%;padding:12px;font-size:28px;font-weight:600;border:2px solid #e8e8e8;border-radius:8px;outline:none;margin-bottom:12px" />
            <input v-model="note" type="text" placeholder="备注（可选）" style="width:100%;padding:10px;font-size:14px;border:2px solid #e8e8e8;border-radius:8px;outline:none;margin-bottom:12px" />
            <input v-model="date" type="date" style="width:100%;padding:10px;font-size:14px;border:2px solid #e8e8e8;border-radius:8px;outline:none;margin-bottom:16px" />
          </div>
          <div class="card" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
            <div v-for="amt in [10, 20, 50, 100, 200, 500]" :key="amt" @click="setAmount(amt)" :class="['btn', { 'btn-active': amount === String(amt) }]" style="text-align:center">{{ amt }}</div>
          </div>
          <button @click="save" :disabled="!amount || !selectedCat" :style="{ width: '100%', padding: '14px', border: 'none', borderRadius: '8px', background: (!amount || !selectedCat) ? '#ccc' : '#4A90D9', color: '#fff', fontSize: '16px', fontWeight: 600, cursor: (!amount || !selectedCat) ? 'not-allowed' : 'pointer', marginTop: '12px' }">保存记录</button>
        </div>
      `,
      setup() {
        const type = ref('expense')
        const amount = ref('')
        const note = ref('')
        const date = ref(new Date().toISOString().split('T')[0])
        const selectedCat = ref(null)
        const cats = computed(() => CATEGORIES[type.value])

        const setType = (t) => { type.value = t; selectedCat.value = null }
        const selectCat = (cat) => { selectedCat.value = cat }
        const setAmount = (amt) => { amount.value = String(amt) }

        const save = () => {
          if (!selectedCat.value || !amount.value) return
          const records = getRecords()
          records.unshift({
            id: Date.now().toString(36),
            type: type.value,
            categoryId: selectedCat.value.id,
            amount: parseFloat(amount.value),
            note: note.value,
            date: date.value,
            createdAt: new Date().toISOString()
          })
          saveRecords(records)
          window.location.hash = '#/'
        }

        return { type, amount, note, date, selectedCat, cats, setType, selectCat, setAmount, save }
      }
    }

    const BillList = {
      template: `
        <div>
          <div class="card" style="text-align:center;font-size:15px;font-weight:600">{{ selectedMonth }}</div>
          <div class="card" style="display:flex;justify-content:space-between">
            <span>支出: <span style="color:#FF6B6B;font-weight:600">¥{{ expense }}</span></span>
            <span>收入: <span style="color:#4CAF50;font-weight:600">¥{{ income }}</span></span>
          </div>
          <div v-if="groups.length === 0" style="text-align:center;padding:48px;color:#999">本月暂无记录</div>
          <div v-for="g in groups" :key="g.date" class="card" style="padding:0;overflow:hidden">
            <div style="padding:10px 16px;background:#f5f6fa;font-size:13px;color:#666;display:flex;justify-content:space-between">
              <span>{{ g.date }}</span>
              <span style="color:#FF6B6B">支出 ¥{{ g.expense }}</span>
            </div>
            <div v-for="r in g.records" :key="r.id" style="display:flex;justify-content:space-between;padding:12px 16px;border-top:1px solid #f0f0f0">
              <span>{{ getCatIcon(r.categoryId) }} {{ getCatName(r.categoryId) }} <span v-if="r.note" style="color:#999;font-size:12px">({{ r.note }})</span></span>
              <span :style="{ color: r.type === 'expense' ? '#FF6B6B' : '#4CAF50', fontWeight: 600 }">
                {{ r.type === 'expense' ? '-' : '+' }}¥{{ r.amount.toFixed(2) }}
              </span>
            </div>
          </div>
        </div>
      `,
      setup() {
        const records = ref([])
        onMounted(() => { records.value = getRecords() })

        const selectedMonth = ref(new Date().toISOString().slice(0, 7))
        const monthRecords = computed(() => records.value.filter(r => r.date && r.date.startsWith(selectedMonth.value)))
        const expense = computed(() => monthRecords.value.filter(r => r.type === 'expense').reduce((s, r) => s + r.amount, 0).toFixed(2))
        const income = computed(() => monthRecords.value.filter(r => r.type === 'income').reduce((s, r) => s + r.amount, 0).toFixed(2))

        const groups = computed(() => {
          const g = {}
          monthRecords.value.forEach(r => {
            const d = r.date?.slice(0, 10) || '未知'
            if (!g[d]) g[d] = []
            g[d].push(r)
          })
          return Object.entries(g).sort((a, b) => b[0].localeCompare(a[0])).map(([date, recs]) => ({
            date,
            records: recs,
            expense: recs.filter(r => r.type === 'expense').reduce((s, r) => s + r.amount, 0).toFixed(2)
          }))
        })

        return { selectedMonth, expense, income, groups, getCatName, getCatIcon }
      }
    }

    const Settings = {
      template: `
        <div>
          <div class="card" style="padding:0;overflow:hidden">
            <div style="padding:14px 16px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;cursor:pointer" @click="exportData">
              <span>导出数据</span><span style="color:#999">→</span>
            </div>
            <div style="padding:14px 16px;cursor:pointer;color:#FF6B6B" @click="clearData">
              <span>清除所有数据</span><span style="float:right;color:#999">→</span>
            </div>
          </div>
          <div class="card" style="padding:14px 16px;display:flex;justify-content:space-between">
            <span>版本</span><span style="color:#999">1.0.0</span>
          </div>
        </div>
      `,
      setup() {
        const exportData = () => {
          const d = localStorage.getItem(STORAGE_KEY)
          if (!d) { alert('暂无数据'); return }
          const b = new Blob([d], { type: 'application/json' }), a = document.createElement('a')
          a.href = URL.createObjectURL(b); a.download = `ledger-${new Date().toISOString().slice(0, 10)}.json`; a.click()
        }
        const clearData = () => { if (confirm('确定清除所有数据？')) { localStorage.removeItem(STORAGE_KEY); location.reload() } }
        return { exportData, clearData }
      }
    }

    const Placeholder = { template: '<div style="text-align:center;padding:48px;color:#999">页面开发中</div>' }

    const routes = [
      { path: '/', component: Home },
      { path: '/add', component: AddRecord },
      { path: '/bill', component: BillList },
      { path: '/settings', component: Settings },
      { path: '/statistics', component: Placeholder },
      { path: '/assets', component: Placeholder },
      { path: '/budget', component: Placeholder },
      { path: '/reimburse', component: Placeholder },
    ]

    const router = createRouter({ history: createWebHashHistory(), routes })

    const app = createApp({})
    app.use(router)
    app.mount('#app')
  </script>
</body>
</html>
